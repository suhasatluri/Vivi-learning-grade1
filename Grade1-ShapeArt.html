<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 Make It With Shapes! – Grade 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
:root{--bg:#0f0e17;--card:#1a1830;--blue:#4a90e2;--pink:#e86dbd;--orange:#f5a623;--green:#52c478;--purple:#9b59b6;--yellow:#f1c40f;--teal:#1abc9c;--red:#e74c3c;--muted:#8888aa}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}

#bg-stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--dl,0s) infinite alternate}
@keyframes twinkle{from{opacity:.04}to{opacity:.45}}

#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* Header */
#header{flex-shrink:0;padding:10px 14px 8px;background:rgba(15,14,23,0.96);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;gap:8px}
#header h1{font-family:'Fredoka One',cursive;font-size:clamp(16px,4.5vw,24px);background:linear-gradient(120deg,var(--orange),var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
#star-bar{font-size:13px;font-weight:900;color:var(--yellow);white-space:nowrap;flex-shrink:0}
#hdr-btns{display:none;gap:5px;align-items:center}

/* Shared scroll area */
.phase{flex:1;overflow-y:auto;padding:12px 12px 36px;display:none;flex-direction:column;align-items:center;gap:10px}
.phase.show{display:flex}

.phase-title{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,28px);background:linear-gradient(120deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.phase-sub{color:var(--muted);font-size:13px;font-weight:800;text-align:center}

/* ── Phase 1: Home ── */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:500px}
@media(min-width:520px){.cat-grid{grid-template-columns:repeat(3,1fr)}}
.cat-card{background:var(--card);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent}
.cat-card:hover{transform:scale(1.06)}
.cat-emoji{font-size:38px;line-height:1.2}
.cat-name{font-family:'Fredoka One',cursive;font-size:15px;margin-top:4px}
.cat-count{font-size:11px;font-weight:800;color:var(--muted);margin-top:2px}

/* ── Phase 2: Category cards ── */
.back-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:50px;color:white;font-family:'Fredoka One',cursive;font-size:13px;padding:5px 14px;cursor:pointer;align-self:flex-start;transition:all .15s;-webkit-tap-highlight-color:transparent}
.back-btn:hover{background:rgba(255,255,255,0.16)}

.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;width:100%;max-width:540px}
@media(min-width:460px){.card-grid{grid-template-columns:repeat(3,1fr)}}
.ch-card{background:var(--card);border:2px solid rgba(255,255,255,0.1);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;position:relative}
.ch-card:hover{transform:scale(1.06)}
.ch-card img{width:100%;height:90px;object-fit:cover;display:block;background:rgba(255,255,255,0.04)}
.ch-card-foot{padding:6px 6px 7px;text-align:center;font-family:'Fredoka One',cursive;font-size:13px}
.ch-card.done{border-color:var(--green)}
.ch-card .done-badge{position:absolute;top:4px;right:4px;font-size:18px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6))}

/* ── Phase 3: Studio ── */
#phase-studio{flex:1;display:none;flex-direction:column;overflow:hidden}
#phase-studio.show{display:flex}
#studio-body{flex:1;display:flex;gap:7px;padding:7px 9px;min-height:0;overflow:hidden}

.side-panel{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.side-label{font-family:'Fredoka One',cursive;font-size:12px;color:var(--muted);text-align:center;flex-shrink:0}
#ref-img-box{flex:1;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center}
#ref-img{width:100%;height:100%;object-fit:contain}

#canvas-box{flex:1;display:flex;align-items:stretch}
#canvas-area{flex:1;position:relative;background:linear-gradient(135deg,#f8f9fa,#e9ecef);border-radius:12px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.45);border:2px solid rgba(255,255,255,0.18);touch-action:none}
#shapes-layer{position:absolute;inset:0;z-index:2}

.placed-shape{position:absolute;transform:translate(-50%,-50%);cursor:grab;touch-action:none;transition:filter .1s}
.placed-shape.selected{filter:drop-shadow(0 0 7px rgba(241,196,15,0.95))}

/* Toolbar */
#toolbar{flex-shrink:0;background:rgba(15,14,23,0.97);border-top:1px solid rgba(255,255,255,0.08);padding:5px 9px 9px;display:flex;flex-direction:column;gap:5px}
.t-row{display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
.t-row::-webkit-scrollbar{display:none}
.t-lbl{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;flex-shrink:0;min-width:32px}

.col-chip{width:22px;height:22px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s}
.col-chip:hover{transform:scale(1.2)}
.col-chip.active{border-color:#fff;transform:scale(1.25)}

.sz-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--muted);font-family:'Fredoka One',cursive;font-size:11px;padding:3px 9px;cursor:pointer;flex-shrink:0;transition:all .15s}
.sz-btn.active{background:rgba(245,166,35,0.25);border-color:var(--orange);color:var(--orange)}

.shp-btn{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:9px;padding:3px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.shp-btn:hover{background:rgba(255,255,255,0.14);transform:scale(1.08)}
.shp-btn.active{border-color:var(--yellow);background:rgba(241,196,15,0.18)}

.act-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:9px;color:white;font-family:'Fredoka One',cursive;font-size:12px;padding:4px 9px;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent}
.act-btn:hover{background:rgba(255,255,255,0.16)}
.act-btn.red{border-color:rgba(231,76,60,0.45);color:var(--red)}
.act-btn.grn{background:linear-gradient(135deg,var(--green),#2ea85b);border-color:transparent}

/* ── Phase 4: Done ── */
.dn-title{font-family:'Fredoka One',cursive;font-size:clamp(22px,6vw,36px);background:linear-gradient(120deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dn-sub{font-family:'Fredoka One',cursive;font-size:clamp(18px,4.5vw,26px);color:var(--yellow)}
.dn-compare{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.dn-panel{display:flex;flex-direction:column;align-items:center;gap:5px}
.dn-panel span{font-size:11px;font-weight:800;color:var(--muted)}
.dn-panel img,.dn-snap{width:min(42vw,190px);height:min(32vw,140px);border-radius:12px;object-fit:contain;box-shadow:0 4px 16px rgba(0,0,0,0.5);background:#fff}
.dn-stars{font-size:17px;font-weight:900;color:var(--yellow)}
.dn-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.dn-btn{border:none;color:white;font-family:'Fredoka One',cursive;font-size:16px;padding:10px 24px;border-radius:50px;cursor:pointer;transition:transform .18s;box-shadow:0 4px 14px rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent}
.dn-btn:hover{transform:scale(1.06)}
.btn-o{background:linear-gradient(135deg,var(--orange),var(--pink))}
.btn-b{background:linear-gradient(135deg,var(--blue),var(--purple))}

.cpcs{position:fixed;z-index:999;pointer-events:none;border-radius:3px;animation:cfall var(--cd,1.4s) var(--cdd,0s) ease-in forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(780deg);opacity:0}}
</style>
</head>
<body>
<div id="bg-stars"></div>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <h1 id="hdr-title">🎨 Make It With Shapes!</h1>
    <div id="hdr-btns">
      <button class="act-btn" onclick="undoLast()">↩</button>
      <button class="act-btn" onclick="rotateSelected()">↻</button>
      <button class="act-btn red" onclick="clearAll()">🗑</button>
      <button class="act-btn grn" onclick="finishArt()">Done ✅</button>
    </div>
    <div id="star-bar">⭐ <span id="sc">0</span></div>
  </div>

  <!-- PHASE 1: Home / Categories -->
  <div id="phase-home" class="phase show">
    <div class="phase-title">🃏 Pick a category!</div>
    <div class="phase-sub">Choose a theme, then build cards with shapes!</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- PHASE 2: Category cards -->
  <div id="phase-category" class="phase">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="phase-title" id="cat-title"></div>
    <div class="phase-sub" id="cat-sub"></div>
    <div class="card-grid" id="card-grid"></div>
  </div>

  <!-- PHASE 3: Studio -->
  <div id="phase-studio">
    <div id="studio-body">
      <div class="side-panel">
        <div class="side-label" id="ref-lbl">📸 Challenge</div>
        <div id="ref-img-box"><img id="ref-img" src="" alt="card"></div>
      </div>
      <div class="side-panel">
        <div class="side-label">🎨 Your creation</div>
        <div id="canvas-box"><div id="canvas-area"><div id="shapes-layer"></div></div></div>
      </div>
    </div>
    <div id="toolbar">
      <div class="t-row"><span class="t-lbl">Colour</span><div id="col-strip"></div></div>
      <div class="t-row">
        <span class="t-lbl">Size</span><div id="sz-strip"></div>
        <div style="flex:1"></div>
        <button class="act-btn" onclick="goCategory()" style="font-size:11px;padding:3px 8px">← Cards</button>
      </div>
      <div class="t-row"><span class="t-lbl">Shape</span><div id="shp-palette"></div></div>
    </div>
  </div>

  <!-- PHASE 4: Done -->
  <div id="phase-done" class="phase">
    <div style="font-size:56px">🎉</div>
    <div class="dn-title">Amazing work!</div>
    <div class="dn-sub" id="dn-name"></div>
    <div class="dn-compare">
      <div class="dn-panel"><span>The card</span><img id="dn-ref" src="" alt="ref"></div>
      <div class="dn-panel"><span>Your version!</span><div class="dn-snap" id="dn-snap"></div></div>
    </div>
    <div class="dn-stars">⭐ <span id="dn-count">0</span> shapes used!</div>
    <div class="dn-btns">
      <button class="dn-btn btn-o" onclick="goCategory()">🃏 Try Another!</button>
      <button class="dn-btn btn-b" onclick="keepEditing()">✏️ Keep Editing</button>
    </div>
  </div>

</div>

<!-- Footer -->
<div style="position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:9px;color:rgba(255,255,255,0.18);padding:2px;pointer-events:none;z-index:999">✨ Helping little learners shine · Suhas Atluri · 2026</div>

<script>
// ── Stars background ──
(function(){
  const c=document.getElementById('bg-stars');
  for(let i=0;i<55;i++){const s=document.createElement('div'),sz=Math.random()*2.5+1;s.className='star';s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s`;c.appendChild(s);}
})();

// ── Card data (loaded from cards.json) ──
let ALL_CARDS = [];
const CATEGORY_META = {
  Animals:  {emoji:'🐾', color:'var(--green)'},
  Vehicles: {emoji:'🚀', color:'var(--blue)'},
  Nature:   {emoji:'🌿', color:'var(--teal)'},
  Objects:  {emoji:'🎁', color:'var(--purple)'},
  People:   {emoji:'👧', color:'var(--pink)'},
  Food:     {emoji:'🍕', color:'var(--orange)'},
};

// ── Shapes / palette ──
const COLS=['#e74c3c','#f5a623','#f1c40f','#52c478','#4a90e2','#9b59b6','#e86dbd','#1abc9c','#2c3e50','#ffffff'];
const SIZES={S:42,M:72,L:115};
const SHAPES=['circle','semicircle','oval','triangle','square','rectangle','thin-rect','quarter'];

function mkSVG(type,color,sz){
  const sk='rgba(0,0,0,0.12)',sw=2,w=sz,h=sz;
  switch(type){
    case'circle':    return`<svg width="${w}" height="${h}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'semicircle':return`<svg width="${w}" height="${Math.round(h*.55)}" viewBox="0 0 100 54"><path d="M4,50 A46,46 0 0,1 96,50 Z" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'oval':      return`<svg width="${Math.round(w*1.6)}" height="${h}" viewBox="0 0 160 100"><ellipse cx="80" cy="50" rx="76" ry="46" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'triangle':  return`<svg width="${w}" height="${h}" viewBox="0 0 100 100"><polygon points="50,4 96,94 4,94" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'square':    return`<svg width="${w}" height="${h}" viewBox="0 0 100 100"><rect x="4" y="4" width="92" height="92" rx="5" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'rectangle': return`<svg width="${Math.round(w*1.6)}" height="${h}" viewBox="0 0 160 100"><rect x="4" y="4" width="152" height="92" rx="5" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'thin-rect': return`<svg width="${Math.round(w*.28)}" height="${h}" viewBox="0 0 28 100"><rect x="3" y="3" width="22" height="94" rx="8" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    case'quarter':   return`<svg width="${w}" height="${h}" viewBox="0 0 100 100"><path d="M4,96 A92,92 0 0,1 96,4 L96,96 Z" fill="${color}" stroke="${sk}" stroke-width="${sw}"/></svg>`;
    default:         return`<svg width="${w}" height="${h}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="${color}"/></svg>`;
  }
}

// ── State ──
let totalStars=0, curColor=COLS[4], curSize='M', selPal=null;
let placed=[], selId=null, nid=1, drag=null, hist=[];
let doneSet=new Set(), activeCard=null, activeCat=null, cW=200, cH=200, lastMoved=false;

// Load persisted stars
try{
  const saved=JSON.parse(localStorage.getItem('shapeArtState')||'{}');
  if(saved.stars) totalStars=saved.stars;
  if(saved.done) doneSet=new Set(saved.done);
}catch(e){}

function saveState(){
  try{localStorage.setItem('shapeArtState',JSON.stringify({stars:totalStars,done:[...doneSet]}));}catch(e){}
}

// ── Init ──
window.addEventListener('DOMContentLoaded', async ()=>{
  document.getElementById('sc').textContent=totalStars;
  try{
    const r=await fetch('assets/shape-cards/cards.json');
    ALL_CARDS=await r.json();
  }catch(e){
    console.error('Failed to load cards.json',e);
    ALL_CARDS=[];
  }
  buildHome();
  buildColors();
  buildSizes();
  buildPalette();
});
window.addEventListener('resize',sizeCanvas);

// ── Phase navigation ──
function showPhase(name){
  ['phase-home','phase-category','phase-studio','phase-done'].forEach(id=>{
    const el=document.getElementById(id);
    if(id==='phase-studio'){el.style.display=name==='studio'?'flex':'none';}
    else{el.classList.toggle('show',id==='phase-'+name);}
  });
  document.getElementById('hdr-btns').style.display=name==='studio'?'flex':'none';
  if(name==='studio') setTimeout(sizeCanvas,40);
}

// ── PHASE 1: Home ──
function buildHome(){
  const g=document.getElementById('cat-grid');
  g.innerHTML='';
  const cats={};
  ALL_CARDS.forEach(c=>{if(!cats[c.category])cats[c.category]=[];cats[c.category].push(c);});

  Object.keys(CATEGORY_META).forEach(cat=>{
    const cards=cats[cat]||[];
    if(!cards.length) return;
    const meta=CATEGORY_META[cat];
    const doneCount=cards.filter(c=>doneSet.has(c.id)).length;
    const d=document.createElement('div');
    d.className='cat-card';
    d.innerHTML=`
      <div class="cat-emoji">${meta.emoji}</div>
      <div class="cat-name">${cat}</div>
      <div class="cat-count">${cards.length} cards${doneCount?' · '+doneCount+'✅':''}</div>`;
    d.onclick=()=>openCategory(cat, cards);
    g.appendChild(d);
  });
  document.getElementById('sc').textContent=totalStars;
}

function goHome(){
  showPhase('home');
  buildHome();
}

// ── PHASE 2: Category ──
let currentCatCards=[];

function openCategory(cat, cards){
  activeCat=cat;
  currentCatCards=cards;
  const meta=CATEGORY_META[cat]||{emoji:'📦'};
  document.getElementById('cat-title').textContent=meta.emoji+' '+cat;
  const doneCount=cards.filter(c=>doneSet.has(c.id)).length;
  document.getElementById('cat-sub').textContent=`${cards.length} challenge cards · ${doneCount} completed`;

  const g=document.getElementById('card-grid');
  g.innerHTML='';
  cards.forEach(c=>{
    const isDone=doneSet.has(c.id);
    const d=document.createElement('div');
    d.className='ch-card'+(isDone?' done':'');
    d.innerHTML=`
      <img src="${c.img}" alt="${c.label}" loading="lazy">
      ${isDone?'<div class="done-badge">✅</div>':''}
      <div class="ch-card-foot">${c.emoji} ${c.label}</div>`;
    d.onclick=()=>startChallenge(c);
    g.appendChild(d);
  });
  showPhase('category');
}

function goCategory(){
  if(activeCat && currentCatCards.length){
    openCategory(activeCat, currentCatCards);
  } else {
    goHome();
  }
}

// ── PHASE 3: Studio ──
function startChallenge(c){
  activeCard=c;
  placed=[];hist=[];selId=null;selPal=null;
  document.querySelectorAll('.shp-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ref-img').src=c.img;
  document.getElementById('ref-lbl').textContent='📸 '+c.label;
  renderShapes();
  showPhase('studio');
  sizeCanvas();
  const sl=document.getElementById('shapes-layer');
  sl.onclick=onCvClick;
  sl.ontouchend=null;
  sl.addEventListener('touchend',onCvTouch,{passive:false});
}

function sizeCanvas(){
  const sb=document.getElementById('studio-body');
  if(!sb) return;
  const r=sb.getBoundingClientRect();
  cW=Math.max(Math.floor((r.width-7-18)/2),90);
  cH=Math.max(r.height-26,90);
  const ca=document.getElementById('canvas-area');
  ca.style.width=cW+'px';ca.style.height=cH+'px';
  renderShapes();
}

function buildColors(){
  const s=document.getElementById('col-strip');
  COLS.forEach(c=>{
    const d=document.createElement('div');d.className='col-chip'+(c===curColor?' active':'');
    d.style.background=c;if(c==='#ffffff')d.style.border='3px solid rgba(180,180,180,0.5)';
    d.onclick=()=>{curColor=c;document.querySelectorAll('.col-chip').forEach(e=>e.classList.remove('active'));d.classList.add('active');
      if(selId){const sh=placed.find(p=>p.id===selId);if(sh){sh.color=c;renderShapes();}}};
    s.appendChild(d);
  });
}

function buildSizes(){
  const s=document.getElementById('sz-strip');
  [{k:'S',l:'Small'},{k:'M',l:'Med'},{k:'L',l:'Large'}].forEach(({k,l})=>{
    const b=document.createElement('button');b.className='sz-btn'+(k===curSize?' active':'');b.textContent=l;
    b.onclick=()=>{curSize=k;document.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
    s.appendChild(b);
  });
}

function buildPalette(){
  const p=document.getElementById('shp-palette');
  const tips={circle:'Circle',semicircle:'Half circle',oval:'Oval',triangle:'Triangle',square:'Square',rectangle:'Rectangle','thin-rect':'Stick',quarter:'Quarter'};
  SHAPES.forEach(t=>{
    const b=document.createElement('button');b.className='shp-btn';b.title=tips[t]||t;
    b.innerHTML=mkSVG(t,'#4a90e2',30);b.dataset.type=t;
    b.onclick=()=>{selPal=t;selId=null;document.querySelectorAll('.shp-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderShapes();};
    p.appendChild(b);
  });
}

// ── Canvas interactions ──
function onCvClick(e){
  if(e.target.closest('.placed-shape'))return;
  if(!selPal)return;
  const r=document.getElementById('canvas-area').getBoundingClientRect();
  addShape(e.clientX-r.left,e.clientY-r.top);
}
function onCvTouch(e){
  if(lastMoved){lastMoved=false;return;}
  if(e.target.closest('.placed-shape'))return;
  if(!selPal)return;
  e.preventDefault();
  const t=e.changedTouches[0],r=document.getElementById('canvas-area').getBoundingClientRect();
  const x=t.clientX-r.left,y=t.clientY-r.top;
  if(x<0||y<0||x>cW||y>cH)return;
  addShape(x,y);
}
function addShape(x,y){
  const id=nid++;
  placed.push({id,type:selPal,color:curColor,size:curSize,x,y,rot:0});
  hist.push({action:'place',id});
  renderShapes();selShape(id);
}

function renderShapes(){
  const layer=document.getElementById('shapes-layer');layer.innerHTML='';
  placed.forEach(s=>{
    const sz=SIZES[s.size];
    const div=document.createElement('div');
    div.className='placed-shape'+(s.id===selId?' selected':'');
    div.style.left=s.x+'px';div.style.top=s.y+'px';
    div.style.transform=`translate(-50%,-50%) rotate(${s.rot||0}deg)`;
    div.style.zIndex=s.id===selId?10:1;
    div.innerHTML=mkSVG(s.type,s.color,sz);div.dataset.id=s.id;
    div.onclick=e=>{e.stopPropagation();selShape(s.id);};
    div.addEventListener('touchstart',onShTS,{passive:false});
    div.addEventListener('touchmove', onShTM,{passive:false});
    div.addEventListener('touchend',  onShTE,{passive:false});
    div.addEventListener('mousedown',onShMD);
    layer.appendChild(div);
  });
}

function selShape(id){selId=id;selPal=null;document.querySelectorAll('.shp-btn').forEach(b=>b.classList.remove('active'));renderShapes();}

// Touch drag
function onShTS(e){
  e.preventDefault();e.stopPropagation();lastMoved=false;
  const id=parseInt(e.currentTarget.dataset.id);selShape(id);
  const t=e.touches[0],s=placed.find(p=>p.id===id);
  drag={id,sx:t.clientX,sy:t.clientY,ox:s.x,oy:s.y};
}
function onShTM(e){
  e.preventDefault();if(!drag)return;lastMoved=true;
  const t=e.touches[0],s=placed.find(p=>p.id===drag.id);
  if(s){s.x=Math.max(0,Math.min(cW,drag.ox+t.clientX-drag.sx));s.y=Math.max(0,Math.min(cH,drag.oy+t.clientY-drag.sy));renderShapes();}
}
function onShTE(e){e.preventDefault();drag=null;}

// Mouse drag
function onShMD(e){
  e.preventDefault();e.stopPropagation();
  const id=parseInt(e.currentTarget.dataset.id);selShape(id);
  const s=placed.find(p=>p.id===id);
  drag={id,sx:e.clientX,sy:e.clientY,ox:s.x,oy:s.y};
  const mv=ev=>{const sh=placed.find(p=>p.id===drag.id);if(sh){sh.x=Math.max(0,Math.min(cW,drag.ox+ev.clientX-drag.sx));sh.y=Math.max(0,Math.min(cH,drag.oy+ev.clientY-drag.sy));renderShapes();}};
  const up=()=>{drag=null;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}

// Toolbar actions
function rotateSelected(){const s=placed.find(p=>p.id===selId);if(s){s.rot=(s.rot||0)+45;renderShapes();}}
function undoLast(){if(!hist.length)return;const l=hist.pop();if(l.action==='place'){placed=placed.filter(s=>s.id!==l.id);if(selId===l.id)selId=null;renderShapes();}}
function clearAll(){if(!placed.length)return;if(!confirm('Clear all shapes?'))return;placed=[];hist=[];selId=null;renderShapes();}

// ── PHASE 4: Done ──
function finishArt(){
  if(!placed.length){alert('Add some shapes first! 🎨');return;}
  doneSet.add(activeCard.id);
  totalStars+=placed.length;
  document.getElementById('sc').textContent=totalStars;
  saveState();

  document.getElementById('dn-name').textContent=activeCard.emoji+' '+activeCard.label;
  document.getElementById('dn-ref').src=activeCard.img;

  // Clone canvas snapshot
  const snap=document.getElementById('canvas-area').cloneNode(true);
  snap.style.position='relative';snap.style.zIndex='';snap.classList.add('dn-snap');
  const sw=document.getElementById('dn-snap');sw.innerHTML='';sw.appendChild(snap);
  document.getElementById('dn-count').textContent=placed.length;
  showPhase('done');confetti();
}

function keepEditing(){showPhase('studio');sizeCanvas();}

function confetti(){
  const cols=['#f5a623','#e86dbd','#4a90e2','#52c478','#f1c40f','#9b59b6','#fff'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div');d.className='cpcs';const sz=5+Math.random()*8;
    d.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${Math.random()*100}vw;top:-10px;--cd:${1.1+Math.random()*.8}s;--cdd:${Math.random()}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),3000);
  }
}
</script>
