<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 Shape Art Studio – Grade 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{
    --bg:#0f0e17;--card:#1a1830;--panel:#16213e;
    --blue:#4a90e2;--pink:#e86dbd;--orange:#f5a623;
    --green:#52c478;--purple:#9b59b6;--yellow:#f1c40f;
    --teal:#1abc9c;--red:#e74c3c;--muted:#8888aa;
  }
  html,body{height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}

  /* ── STARS ── */
  #bg-stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--dl,0s) infinite alternate}
  @keyframes twinkle{from{opacity:.04}to{opacity:.45}}

  /* ── LAYOUT ── */
  #app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

  /* ── HEADER ── */
  #header{flex-shrink:0;text-align:center;padding:12px 16px 8px;background:rgba(15,14,23,0.95);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;gap:10px}
  #header h1{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,28px);background:linear-gradient(120deg,var(--orange),var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
  #art-name-input{flex:1;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:12px;color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:7px 12px;outline:none;min-width:0;-webkit-user-select:text;user-select:text}
  #art-name-input::placeholder{color:var(--muted)}
  #art-name-input:focus{border-color:var(--orange)}

  /* ── PHASE 1: TEMPLATE PICKER ── */
  #phase-pick{flex:1;overflow-y:auto;padding:16px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}
  #phase-pick h2{font-family:'Fredoka One',cursive;font-size:clamp(20px,5vw,30px);background:linear-gradient(120deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
  #phase-pick p{color:var(--muted);font-size:13px;font-weight:800;text-align:center}
  .template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:480px}
  .tmpl-card{background:var(--card);border:2px solid rgba(255,255,255,0.1);border-radius:18px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
  .tmpl-card:hover{transform:scale(1.06)}
  .tmpl-card svg{border-radius:10px}
  .tmpl-card span{font-family:'Fredoka One',cursive;font-size:13px;color:white}

  /* ── PHASE 2: STUDIO ── */
  #phase-studio{flex:1;display:none;flex-direction:column;overflow:hidden}

  /* canvas wrap */
  #canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-height:0}
  #canvas-area{position:relative;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5);flex-shrink:0;touch-action:none}
  #stencil-layer{position:absolute;inset:0;pointer-events:none;z-index:1}
  #shapes-layer{position:absolute;inset:0;z-index:2}

  /* placed shape */
  .placed-shape{position:absolute;transform:translate(-50%,-50%);cursor:grab;touch-action:none;transition:filter .15s}
  .placed-shape.selected{filter:drop-shadow(0 0 8px rgba(241,196,15,0.9))}
  .placed-shape:active{cursor:grabbing}

  /* ── BOTTOM TOOLBAR ── */
  #toolbar{flex-shrink:0;background:rgba(15,14,23,0.97);border-top:1px solid rgba(255,255,255,0.08);padding:8px 10px 12px;display:flex;flex-direction:column;gap:7px}

  /* row styles */
  .t-row{display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
  .t-row::-webkit-scrollbar{display:none}
  .t-label{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;flex-shrink:0}

  /* color chips */
  .color-chip{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s}
  .color-chip:hover{transform:scale(1.15)}
  .color-chip.active{border-color:white;transform:scale(1.2)}

  /* size buttons */
  .size-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--muted);font-family:'Fredoka One',cursive;font-size:14px;padding:4px 14px;cursor:pointer;flex-shrink:0;transition:all .15s;white-space:nowrap}
  .size-btn.active{background:rgba(245,166,35,0.25);border-color:var(--orange);color:var(--orange)}

  /* shape palette buttons */
  .shape-pal-btn{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:5px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .shape-pal-btn:hover{background:rgba(255,255,255,0.14);transform:scale(1.08)}
  .shape-pal-btn.active{border-color:var(--yellow);background:rgba(241,196,15,0.18)}

  /* action buttons */
  .act-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:12px;color:white;font-family:'Fredoka One',cursive;font-size:14px;padding:6px 12px;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .15s}
  .act-btn:hover{background:rgba(255,255,255,0.16)}
  .act-btn.danger{border-color:rgba(231,76,60,0.4);color:var(--red)}
  .act-btn.danger:hover{background:rgba(231,76,60,0.2)}
  .act-btn.primary{background:linear-gradient(135deg,var(--green),#2ea85b);border-color:transparent;color:white}

  /* ── PHASE 3: DONE ── */
  #phase-done{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:16px}
  #done-title{font-family:'Fredoka One',cursive;font-size:clamp(26px,7vw,42px);background:linear-gradient(120deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  #done-art-name{font-family:'Fredoka One',cursive;font-size:clamp(20px,5vw,30px);color:var(--yellow)}
  #done-canvas-preview{border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.6);max-width:90vw;max-height:40vh}
  #done-stars{font-size:20px;font-weight:900;color:var(--yellow)}
  .done-btn{border:none;color:white;font-family:'Fredoka One',cursive;font-size:18px;padding:12px 28px;border-radius:50px;cursor:pointer;transition:transform .18s;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
  .done-btn:hover{transform:scale(1.06)}
  .btn-orange2{background:linear-gradient(135deg,var(--orange),var(--pink))}
  .btn-blue2{background:linear-gradient(135deg,var(--blue),var(--purple))}

  /* confetti */
  .cpcs{position:fixed;z-index:999;pointer-events:none;border-radius:3px;animation:cfall var(--cd,1.4s) var(--cdd,0s) ease-in forwards}
  @keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(780deg);opacity:0}}

  .hidden{display:none!important}
  @media(min-width:600px){.template-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div id="bg-stars"></div>
<div id="app">

  <!-- ── HEADER ── -->
  <div id="header">
    <h1>🎨 Shape Art</h1>
    <input id="art-name-input" type="text" placeholder="Name your picture..." maxlength="30">
    <div style="display:flex;gap:6px;flex-shrink:0" id="header-btns">
      <button class="act-btn" onclick="undoLast()" title="Undo">↩</button>
      <button class="act-btn danger" onclick="clearAll()" title="Clear">🗑</button>
      <button class="act-btn primary" onclick="finishArt()">✅ Done!</button>
    </div>
  </div>

  <!-- ── PHASE 1: PICK TEMPLATE ── -->
  <div id="phase-pick">
    <h2>Choose your canvas! 🖼️</h2>
    <p>Pick a stencil to trace or draw freely</p>
    <div class="template-grid" id="tmpl-grid"></div>
  </div>

  <!-- ── PHASE 2: STUDIO ── -->
  <div id="phase-studio">
    <div id="canvas-wrap">
      <div id="canvas-area">
        <svg id="stencil-layer" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="shapes-layer"></div>
      </div>
    </div>

    <div id="toolbar">
      <!-- Colors -->
      <div class="t-row">
        <span class="t-label">Colour</span>
        <div id="color-strip"></div>
      </div>
      <!-- Sizes + Actions -->
      <div class="t-row">
        <span class="t-label">Size</span>
        <div id="size-strip"></div>
        <div style="flex:1"></div>
        <button class="act-btn" style="font-size:12px;padding:5px 10px" onclick="rotateSelected()">↻ Rotate</button>
      </div>
      <!-- Shapes -->
      <div class="t-row">
        <span class="t-label">Shapes</span>
        <div id="shape-palette"></div>
      </div>
    </div>
  </div>

  <!-- ── PHASE 3: DONE ── -->
  <div id="phase-done">
    <div style="font-size:70px">🎉</div>
    <div id="done-title">Amazing Creation!</div>
    <div id="done-art-name"></div>
    <div id="done-canvas-preview"></div>
    <div id="done-stars">⭐ You used <span id="done-count">0</span> shapes!</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="done-btn btn-orange2" onclick="backToPick()">🎨 Make Another!</button>
      <button class="done-btn btn-blue2" onclick="keepEditing()">✏️ Keep Editing</button>
    </div>
  </div>

</div>

<script>
// ── STARS ──────────────────────────────────────
(function(){
  const c=document.getElementById('bg-stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div'),sz=Math.random()*2.5+1;
    s.className='star';
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s`;
    c.appendChild(s);
  }
})();

// ── CONSTANTS ──────────────────────────────────
const COLORS=['#e74c3c','#f5a623','#f1c40f','#52c478','#4a90e2','#9b59b6','#e86dbd','#1abc9c','#ffffff','#2c3e50'];
const SIZES={S:55, M:90, L:140};
const SHAPE_TYPES=['circle','square','triangle','rectangle','hexagon','diamond','oval','trapezium','star'];

// Shape SVG generators (returns innerHTML for the SVG element)
function shapeSVG(type, color, w, h){
  const stroke='rgba(0,0,0,0.15)'; const sw=2;
  switch(type){
    case 'circle':
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'square':
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><rect x="4" y="4" width="92" height="92" rx="6" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'triangle':
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><polygon points="50,4 96,94 4,94" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'rectangle':
      return `<svg width="${Math.round(w*1.6)}" height="${h}" viewBox="0 0 160 100"><rect x="4" y="4" width="152" height="92" rx="6" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'hexagon':
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><polygon points="50,4 93,27 93,73 50,96 7,73 7,27" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'diamond':
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><polygon points="50,4 96,50 50,96 4,50" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'oval':
      return `<svg width="${Math.round(w*1.5)}" height="${h}" viewBox="0 0 150 100"><ellipse cx="75" cy="50" rx="71" ry="46" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'trapezium':
      return `<svg width="${Math.round(w*1.3)}" height="${h}" viewBox="0 0 130 100"><polygon points="20,96 110,96 95,4 35,4" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    case 'star':
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><polygon points="50,4 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="${color}" stroke="${stroke}" stroke-width="${sw}"/></svg>`;
    default:
      return `<svg width="${w}" height="${h}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="${color}"/></svg>`;
  }
}

// Palette shape preview (always square container)
function paletteSVG(type, color, size){
  return shapeSVG(type, color, size, size);
}

// ── STENCILS ───────────────────────────────────
const STENCILS=[
  {id:'free',    label:'Free Draw', emoji:'🎨', color:'#f5a623',
   paths:null},
  {id:'house',   label:'House',     emoji:'🏠', color:'#4a90e2',
   paths:[
    'M180,28 L320,148 L40,148 Z',           // roof
    'M60,148 L60,320 L300,320 L300,148 Z',  // body
    'M140,230 L140,320 L220,320 L220,230 Z',// door
    'M78,168 L138,168 L138,218 L78,218 Z',  // left window
    'M222,168 L282,168 L282,218 L222,218 Z',// right window
    'M180,28 L180,50',                       // chimney top
   ]},
  {id:'rocket',  label:'Rocket',    emoji:'🚀', color:'#9b59b6',
   paths:[
    'M180,30 C220,30 240,80 240,140 L240,260 L120,260 L120,140 C120,80 140,30 180,30 Z', // body
    'M120,240 L75,310 L120,310 Z',   // left fin
    'M240,240 L285,310 L240,310 Z',  // right fin
    'M155,130 A25,25 0 1,1 205,130 A25,25 0 1,1 155,130 Z', // window circle
    'M160,310 C165,330 175,340 180,345 C185,340 195,330 200,310 Z', // flame
   ]},
  {id:'fish',    label:'Fish',      emoji:'🐟', color:'#1abc9c',
   paths:[
    'M60,180 C60,120 120,70 200,70 C280,70 330,120 330,180 C330,240 280,290 200,290 C120,290 60,240 60,180 Z', // body
    'M62,180 L10,130 L10,230 Z',   // tail
    'M260,145 A18,18 0 1,1 296,145 A18,18 0 1,1 260,145 Z', // eye
   ]},
  {id:'tree',    label:'Tree',      emoji:'🌳', color:'#52c478',
   paths:[
    'M180,20 L320,230 L40,230 Z',  // crown
    'M145,220 L145,330 L215,330 L215,220 Z', // trunk
   ]},
  {id:'butterfly',label:'Butterfly',emoji:'🦋', color:'#e86dbd',
   paths:[
    'M180,180 C160,130 60,80 40,130 C20,180 80,230 180,180 Z',   // left top
    'M180,180 C160,210 70,250 60,300 C50,330 120,320 180,180 Z',  // left bottom
    'M180,180 C200,130 300,80 320,130 C340,180 280,230 180,180 Z',// right top
    'M180,180 C200,210 290,250 300,300 C310,330 240,320 180,180 Z',// right bottom
    'M180,120 L180,270',  // body
   ]},
  {id:'sun',     label:'Sun',       emoji:'☀️', color:'#f1c40f',
   paths:[
    'M180,180 m-70,0 a70,70 0 1,0 140,0 a70,70 0 1,0 -140,0', // circle
    'M180,60 L180,40 M180,300 L180,320 M60,180 L40,180 M300,180 L320,180', // cardinal rays
    'M93,93 L78,78 M267,267 L282,282 M93,267 L78,282 M267,93 L282,78',    // diagonal rays
   ]},
  {id:'robot',   label:'Robot',     emoji:'🤖', color:'#4a90e2',
   paths:[
    'M100,100 L280,100 L280,230 L100,230 Z', // body
    'M120,60  L260,60  L260,100 L120,100 Z', // head
    'M140,70  A15,15 0 1,1 170,70 A15,15 0 1,1 140,70 Z', // left eye
    'M210,70  A15,15 0 1,1 240,70 A15,15 0 1,1 210,70 Z', // right eye
    'M150,85  L230,85', // mouth
    'M60,110  L100,110 L100,200 L60,200 Z',  // left arm
    'M280,110 L320,110 L320,200 L280,200 Z', // right arm
    'M130,230 L130,320 L170,320 L170,230 Z', // left leg
    'M210,230 L210,320 L250,320 L250,230 Z', // right leg
   ]},
  {id:'car',     label:'Car',       emoji:'🚗', color:'#e74c3c',
   paths:[
    'M40,200 L80,140 L260,140 L300,200 L300,270 L40,270 Z', // body
    'M90,200 L90,140',  // window line left
    'M250,200 L250,140', // window line right
    'M85,270  A35,35 0 1,1 155,270 A35,35 0 1,1 85,270 Z',   // left wheel
    'M205,270 A35,35 0 1,1 275,270 A35,35 0 1,1 205,270 Z',  // right wheel
    'M280,195 L310,195', // headlight
   ]},
];

// ── STATE ──────────────────────────────────────
let currentColor = COLORS[4]; // blue
let currentSize  = 'M';
let selectedPalShape = null; // type string
let placedShapes = [];  // {id, type, color, w, h, x, y, rot}
let selectedId = null;
let nextId = 1;
let dragInfo = null;
let activeStencil = null;
let canvasSize = 320; // will be set dynamically
let shapeHistory = []; // for undo

// ── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  buildStars();
  buildTemplateGrid();
  buildColorStrip();
  buildSizeStrip();
  buildShapePalette();
  sizeCanvas();
});

window.addEventListener('resize', sizeCanvas);

function sizeCanvas(){
  const wrap = document.getElementById('canvas-wrap');
  const rect  = wrap.getBoundingClientRect();
  const sz = Math.min(rect.width - 20, rect.height - 16, 480);
  canvasSize = Math.max(sz, 200);
  const ca = document.getElementById('canvas-area');
  ca.style.width  = canvasSize+'px';
  ca.style.height = canvasSize+'px';
  const sl = document.getElementById('stencil-layer');
  sl.setAttribute('width', canvasSize);
  sl.setAttribute('height', canvasSize);
  sl.setAttribute('viewBox','0 0 360 360');
  renderShapes();
}

// ── TEMPLATE GRID ──────────────────────────────
function buildTemplateGrid(){
  const grid = document.getElementById('tmpl-grid');
  STENCILS.forEach(t=>{
    const card = document.createElement('div');
    card.className='tmpl-card';
    card.style.borderColor=t.color+'55';
    // Mini preview SVG
    const previewSVG = buildStencilSVG(t, 90, 90);
    card.innerHTML = `${previewSVG}<span>${t.emoji} ${t.label}</span>`;
    card.onclick = ()=>startStudio(t);
    grid.appendChild(card);
  });
}

function buildStencilSVG(stencil, w, h){
  if(!stencil.paths){
    return `<svg width="${w}" height="${h}" viewBox="0 0 360 360" style="background:rgba(255,255,255,0.06);border-radius:10px"><text x="50%" y="55%" text-anchor="middle" font-size="80" dominant-baseline="middle">🎨</text></svg>`;
  }
  const pathEls = stencil.paths.map(d=>`<path d="${d}" fill="none" stroke="${stencil.color}" stroke-width="8" stroke-dasharray="14,8" stroke-linecap="round" stroke-linejoin="round"/>`).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 360 360" style="background:rgba(255,255,255,0.06);border-radius:10px">${pathEls}</svg>`;
}

// ── START STUDIO ────────────────────────────────
function startStudio(stencil){
  activeStencil = stencil;
  placedShapes = [];
  shapeHistory = [];
  selectedId = null;
  selectedPalShape = null;
  document.getElementById('art-name-input').value='';

  // Render stencil
  const sl = document.getElementById('stencil-layer');
  if(stencil.paths){
    sl.innerHTML = stencil.paths.map(d=>
      `<path d="${d}" fill="none" stroke="${stencil.color}" stroke-width="5" stroke-dasharray="14,8" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>`
    ).join('');
  } else {
    sl.innerHTML='';
  }

  // Canvas bg: white with subtle grid for free draw
  const ca = document.getElementById('canvas-area');
  ca.style.background = stencil.id==='free'
    ? 'linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%)'
    : 'linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%)';

  renderShapes();
  showPhase('studio');

  // Setup canvas touch/click to place shapes
  const shapesLayer = document.getElementById('shapes-layer');
  shapesLayer.onclick = onCanvasClick;
  shapesLayer.addEventListener('touchend', onCanvasTouchEnd, {passive:false});

  // Deselect highlight
  document.querySelectorAll('.shape-pal-btn').forEach(b=>b.classList.remove('active'));
}

// ── COLOR STRIP ────────────────────────────────
function buildColorStrip(){
  const strip = document.getElementById('color-strip');
  COLORS.forEach(c=>{
    const chip = document.createElement('div');
    chip.className='color-chip';
    chip.style.background=c;
    if(c===currentColor) chip.classList.add('active');
    chip.style.border = c==='#ffffff' ? '3px solid rgba(255,255,255,0.3)' : '3px solid transparent';
    chip.onclick=()=>selectColor(c, chip);
    strip.appendChild(chip);
  });
}

function selectColor(c, chip){
  currentColor = c;
  document.querySelectorAll('.color-chip').forEach(el=>el.classList.remove('active'));
  chip.classList.add('active');
  // Update selected placed shape if any
  if(selectedId){
    const s = placedShapes.find(ps=>ps.id===selectedId);
    if(s){ s.color=c; renderShapes(); }
  }
}

// ── SIZE STRIP ─────────────────────────────────
function buildSizeStrip(){
  const strip = document.getElementById('size-strip');
  ['S','M','L'].forEach(sz=>{
    const btn = document.createElement('button');
    btn.className='size-btn' + (sz===currentSize?' active':'');
    btn.textContent=sz==='S'?'Small':sz==='M'?'Medium':'Large';
    btn.onclick=()=>{
      currentSize=sz;
      document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    strip.appendChild(btn);
  });
}

// ── SHAPE PALETTE ──────────────────────────────
function buildShapePalette(){
  const pal = document.getElementById('shape-palette');
  SHAPE_TYPES.forEach(type=>{
    const btn = document.createElement('button');
    btn.className='shape-pal-btn';
    btn.innerHTML = paletteSVG(type, '#4a90e2', 38);
    btn.dataset.type = type;
    btn.title = type.charAt(0).toUpperCase()+type.slice(1);
    btn.onclick=()=>selectPaletteShape(type, btn);
    pal.appendChild(btn);
  });
}

function selectPaletteShape(type, btn){
  selectedPalShape = type;
  selectedId = null; // deselect placed shape
  document.querySelectorAll('.shape-pal-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderShapes(); // remove selection highlight
}

// ── CANVAS INTERACTION ─────────────────────────
function onCanvasClick(e){
  if(e.target.closest('.placed-shape')) return; // handled by shape click
  if(!selectedPalShape) return;
  const rect = document.getElementById('canvas-area').getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  placeShape(x, y);
}

let lastTouchWasMove = false;

function onCanvasTouchEnd(e){
  if(lastTouchWasMove){ lastTouchWasMove=false; return; }
  if(e.target.closest('.placed-shape')) return;
  if(!selectedPalShape) return;
  e.preventDefault();
  const touch = e.changedTouches[0];
  const rect = document.getElementById('canvas-area').getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
  if(x<0||y<0||x>canvasSize||y>canvasSize) return;
  placeShape(x, y);
}

function placeShape(x, y){
  const sz = SIZES[currentSize];
  const id = nextId++;
  const shape = {id, type:selectedPalShape, color:currentColor, size:currentSize, w:sz, h:sz, x, y, rot:0};
  placedShapes.push(shape);
  shapeHistory.push({action:'place', id});
  renderShapes();
  selectPlacedShape(id);
}

// ── RENDER SHAPES ──────────────────────────────
function renderShapes(){
  const layer = document.getElementById('shapes-layer');
  layer.innerHTML='';
  const scale = canvasSize / 360;

  placedShapes.forEach(s=>{
    const div = document.createElement('div');
    div.className='placed-shape' + (s.id===selectedId?' selected':'');
    div.style.left  = s.x+'px';
    div.style.top   = s.y+'px';
    div.style.transform = `translate(-50%,-50%) rotate(${s.rot||0}deg)`;
    div.style.zIndex = s.id===selectedId?10:1;
    // Size scaled to canvas
    const dispSz = Math.round(SIZES[s.size] * (canvasSize/360));
    div.innerHTML = shapeSVG(s.type, s.color, dispSz, dispSz);
    div.dataset.id = s.id;

    // Click to select
    div.onclick = (e)=>{ e.stopPropagation(); selectPlacedShape(s.id); };

    // Touch drag
    div.addEventListener('touchstart', onShapeTouchStart, {passive:false});
    div.addEventListener('touchmove',  onShapeTouchMove,  {passive:false});
    div.addEventListener('touchend',   onShapeTouchEnd,   {passive:false});

    // Mouse drag
    div.addEventListener('mousedown',  onShapeMouseDown);

    layer.appendChild(div);
  });
}

function selectPlacedShape(id){
  selectedId = id;
  selectedPalShape = null;
  document.querySelectorAll('.shape-pal-btn').forEach(b=>b.classList.remove('active'));
  renderShapes();
}

// ── TOUCH DRAG ─────────────────────────────────
function onShapeTouchStart(e){
  e.preventDefault(); e.stopPropagation();
  lastTouchWasMove = false;
  const id = parseInt(e.currentTarget.dataset.id);
  selectPlacedShape(id);
  const touch = e.touches[0];
  const s = placedShapes.find(ps=>ps.id===id);
  const rect = document.getElementById('canvas-area').getBoundingClientRect();
  dragInfo={id, startX:touch.clientX, startY:touch.clientY, origX:s.x, origY:s.y, rect};
}

function onShapeTouchMove(e){
  e.preventDefault();
  if(!dragInfo) return;
  lastTouchWasMove = true;
  const touch = e.touches[0];
  const dx = touch.clientX - dragInfo.startX;
  const dy = touch.clientY - dragInfo.startY;
  const s = placedShapes.find(ps=>ps.id===dragInfo.id);
  if(s){
    s.x = Math.max(0, Math.min(canvasSize, dragInfo.origX+dx));
    s.y = Math.max(0, Math.min(canvasSize, dragInfo.origY+dy));
    renderShapes();
  }
}

function onShapeTouchEnd(e){ e.preventDefault(); dragInfo=null; }

// ── MOUSE DRAG ─────────────────────────────────
function onShapeMouseDown(e){
  e.preventDefault(); e.stopPropagation();
  const id = parseInt(e.currentTarget.dataset.id);
  selectPlacedShape(id);
  const s = placedShapes.find(ps=>ps.id===id);
  const rect = document.getElementById('canvas-area').getBoundingClientRect();
  dragInfo={id, startX:e.clientX, startY:e.clientY, origX:s.x, origY:s.y, rect};

  const onMove = (ev)=>{
    if(!dragInfo) return;
    const dx=ev.clientX-dragInfo.startX, dy=ev.clientY-dragInfo.startY;
    const sh=placedShapes.find(ps=>ps.id===dragInfo.id);
    if(sh){ sh.x=Math.max(0,Math.min(canvasSize,dragInfo.origX+dx)); sh.y=Math.max(0,Math.min(canvasSize,dragInfo.origY+dy)); renderShapes(); }
  };
  const onUp = ()=>{ dragInfo=null; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
}

// ── CONTROLS ───────────────────────────────────
function rotateSelected(){
  if(!selectedId) return;
  const s = placedShapes.find(ps=>ps.id===selectedId);
  if(s){ s.rot=(s.rot||0)+45; renderShapes(); }
}

function undoLast(){
  if(!shapeHistory.length) return;
  const last = shapeHistory.pop();
  if(last.action==='place'){
    placedShapes = placedShapes.filter(s=>s.id!==last.id);
    if(selectedId===last.id) selectedId=null;
    renderShapes();
  }
}

function clearAll(){
  if(placedShapes.length===0) return;
  if(!confirm('Clear all shapes? This cannot be undone.')) return;
  placedShapes=[];shapeHistory=[];selectedId=null;renderShapes();
}

// ── FINISH ─────────────────────────────────────
function finishArt(){
  if(placedShapes.length===0){ alert('Add some shapes first! 🎨'); return; }
  const name = document.getElementById('art-name-input').value.trim() || 'My Masterpiece';

  // Clone canvas for preview
  const preview = document.getElementById('canvas-area').cloneNode(true);
  preview.style.width  = Math.min(canvasSize,280)+'px';
  preview.style.height = Math.min(canvasSize,280)+'px';
  preview.style.position = 'relative';
  preview.style.zIndex = '';

  document.getElementById('done-canvas-preview').innerHTML='';
  document.getElementById('done-canvas-preview').appendChild(preview);
  document.getElementById('done-art-name').textContent = '🖼️ "'+name+'"';
  document.getElementById('done-count').textContent = placedShapes.length;

  showPhase('done');
  confetti();
}

function keepEditing(){
  showPhase('studio');
}

function backToPick(){
  placedShapes=[];shapeHistory=[];selectedId=null;
  showPhase('pick');
}

function showPhase(name){
  document.getElementById('phase-pick').style.display    = name==='pick'   ?'flex':'none';
  document.getElementById('phase-studio').style.display  = name==='studio' ?'flex':'none';
  document.getElementById('phase-done').style.display    = name==='done'   ?'flex':'none';
  document.getElementById('header-btns').style.display   = name==='studio' ?'flex':'none';
  document.getElementById('art-name-input').style.display= name==='studio' ?'':'none';
}

// ── CONFETTI ───────────────────────────────────
function confetti(){
  const cols=['#f5a623','#e86dbd','#4a90e2','#52c478','#f1c40f','#9b59b6','#1abc9c','#fff'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div'); d.className='cpcs';
    const sz=6+Math.random()*8;
    d.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${Math.random()*100}vw;top:-12px;--cd:${1.2+Math.random()*.8}s;--cdd:${Math.random()}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}
